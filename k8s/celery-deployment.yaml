apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: smart-city
spec:
  replicas: 5
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: smartcity/celery-worker:latest
        env:
        - name: DATABASE_URL
          value: "postgresql://admin:secure_password@timescaledb:5432/smartcity_db"
        - name: CELERY_BROKER_URL
          value: "redis://redis-cluster:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-cluster:6379/0"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: smart-city
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
